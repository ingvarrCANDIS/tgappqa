<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TG Test</title>
</head>
<body>
    <h1>Telegram Mini App Test</h1>
    <p id="status">Загрузка...</p>
    
    <!-- ⚠️ ЭТА СТРОКА БЫЛА ОТСУТСТВУЕТ! БЕЗ НЕЁ НИЧЕГО НЕ РАБОТАЕТ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
        // Ждём загрузки SDK
        setTimeout(() => {
            document.getElementById('status').innerHTML = 'Скрипт работает, проверяем Telegram...<br>';
            
            // Проверяем, есть ли Telegram WebApp
            if (typeof window.Telegram !== 'undefined') {
                document.getElementById('status').innerHTML += '✅ window.Telegram найден!<br>';
                if (window.Telegram.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    const user = tg.initDataUnsafe?.user;
                    if (user) {
                        document.getElementById('status').innerHTML += '✅ Данные пользователя: ' + user.first_name + ' (ID: ' + user.id + ')';
                    } else {
                        document.getElementById('status').innerHTML += '❌ Данные пользователя не получены';
                    }
                } else {
                    document.getElementById('status').innerHTML += '❌ window.Telegram.WebApp не найден';
                }
            } else {
                document.getElementById('status').innerHTML = '❌ window.Telegram не найден<br>';
                document.getElementById('status').innerHTML += 'Вы открыли приложение не через Telegram Mini App, а как обычный сайт.<br>';
                document.getElementById('status').innerHTML += '<br><strong>Проверьте:</strong><br>';
                document.getElementById('status').innerHTML += '1. Открываете через кнопку меню бота?<br>';
                document.getElementById('status').innerHTML += '2. Ссылка в BotFather правильная?<br>';
                document.getElementById('status').innerHTML += '3. GitHub Pages включён?';
            }
            
            // Дополнительно: показываем текущий URL
            document.getElementById('status').innerHTML += '<br><br>📎 Текущий URL: ' + window.location.href;
        }, 200);
    </script>
</body>
</html>
