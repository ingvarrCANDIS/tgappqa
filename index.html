<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой профиль</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            transition: background 0.2s;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: #31b545;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        button {
            width: 100%;
            background: var(--tg-theme-button-color, #31b545);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="card">
        <div class="avatar" id="avatar"></div>
        
        <div class="info-row">
            <span>🆔 ID</span>
            <span id="user-id">—</span>
        </div>
        <div class="info-row">
            <span>👤 Имя</span>
            <span id="first-name">—</span>
        </div>
        <div class="info-row">
            <span>📛 Username</span>
            <span id="username">—</span>
        </div>
        <div class="info-row">
            <span>⭐️ Premium</span>
            <span id="premium">—</span>
        </div>
        <div class="info-row">
            <span>🌐 Язык</span>
            <span id="language">—</span>
        </div>
        
        <button id="copy-btn">📋 Копировать данные</button>
    </div>

    <script>
        setTimeout(() => {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Адаптация под тему Telegram
            document.body.style.backgroundColor = tg.themeParams.bg_color;
            document.body.style.color = tg.themeParams.text_color;
            
            const user = tg.initDataUnsafe.user;
            
            if (user) {
                document.getElementById('user-id').textContent = user.id;
                document.getElementById('first-name').textContent = user.first_name;
                document.getElementById('username').textContent = user.username ? '@' + user.username : '—';
                document.getElementById('premium').textContent = user.is_premium ? '✅ Да' : '❌ Нет';
                document.getElementById('language').textContent = user.language_code || '—';
                
                const avatar = document.getElementById('avatar');
                avatar.textContent = (user.first_name?.[0] || '?').toUpperCase();
            }
            
            // Кнопка копирования
            document.getElementById('copy-btn').onclick = () => {
                const text = `ID: ${user.id}\nИмя: ${user.first_name}\nUsername: @${user.username || '—'}\nPremium: ${user.is_premium ? 'Да' : 'Нет'}`;
                navigator.clipboard.writeText(text);
                tg.HapticFeedback?.notificationOccurred('success');
                alert('Скопировано!');
            };
        }, 200);
    </script>
</body>
</html>
